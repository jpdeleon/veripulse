database:
  path: "data/veripulse.db"
  echo: false

scraping:
  interval_minutes: 60
  max_articles_per_run: 50
  timeout_seconds: 30
  retry_attempts: 3

news_sources:
  ddg_news:
    enabled: true   # Free, no API key, returns direct article URLs — uses topics list below
  google_news:
    enabled: false  # Free RSS fallback; URLs are Google proxies requiring extra resolution
  newsdata:
    enabled: false
    api_key: ""  # Set NEWSDATA_API_KEY in .env
  newsapi:
    enabled: false
    api_key: ""  # Set NEWSAPI_API_KEY in .env
  rss:
    enabled: false
    feeds:
      - url: "https://www.philstar.com/rss/headlines"
        category: "general"
      - url: "https://www.rappler.com/rss/news"
        category: "general"
      - url: "https://mb.com.ph/rss"
        category: "general"

topics:
  - "Education"
  - "Internship"
  - "Scholarship"
  - "Science"
  - "Education Philippines"
  - "Scholarship Philippines"
  - "CHED scholarship"
  - "DepEd programs"
  - "Filipino students"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  host: ""  # Set OLLAMA_SSH_HOST in .env to tunnel over SSH (ProxyJump supported)
  model: "qwen3.5:latest"
  temperature: 0.3
  max_tokens: 2048
  timeout_seconds: 120

embeddings:
  model: "paraphrase-multilingual-MiniLM-L12-v2"
  device: "cpu"

social:
  twitter:
    enabled: false
    api_key: ""       # Set TWITTER_API_KEY in .env
    api_secret: ""    # Set TWITTER_API_SECRET in .env
    access_token: ""  # Set TWITTER_ACCESS_TOKEN in .env
    access_secret: "" # Set TWITTER_ACCESS_SECRET in .env
  facebook:
    enabled: true
    page_access_token: ""  # Set FACEBOOK_PAGE_ACCESS_TOKEN in .env
    page_id: ""            # Set FACEBOOK_PAGE_ID in .env

editorial:
  auto_generate_summary: false
  require_full_review: true
  max_article_age_hours: 24

logging:
  level: "INFO"
  file: "data/veripulse.log"
  rotation: "100 MB"
  retention: "30 days"
